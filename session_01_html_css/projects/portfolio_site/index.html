<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal portfolio website — Header and Hero section exercise">
    <title>My Portfolio | Web Developer</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS files -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header id="site-header">
        <!-- Mobile hamburger toggle (CSS-only checkbox hack) -->
        <input type="checkbox" id="menu-toggle" class="menu-toggle" aria-hidden="true">

        <div class="header-inner">
            <!-- Logo -->
            <a href="#" class="logo" aria-label="Go to homepage">YourName</a>

            <!-- Hamburger icon label (visible on mobile) -->
            <label for="menu-toggle" class="hamburger" aria-label="Toggle navigation menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </label>

            <!-- Navigation -->
            <nav id="main-nav" role="navigation" aria-label="Main navigation">
                <a href="#about"     class="nav-link">About</a>
                <a href="#skills"    class="nav-link">Skills</a>
                <a href="#portfolio" class="nav-link">Portfolio</a>
                <a href="#contact"   class="nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main id="main-content">

        <!-- ===== HERO SECTION ===== -->
        <section id="hero" class="hero" aria-label="Hero introduction">
            <div class="hero-content">
                <span class="hero-greeting">👋 Hello, World!</span>
                <h1 class="hero-title">Hi, I'm <span class="highlight">Your Name</span></h1>
                <p class="hero-subtitle">Full-Stack Developer &nbsp;|&nbsp; UI Designer &nbsp;|&nbsp; Problem Solver</p>
                <div class="hero-actions">
                    <a href="#portfolio" class="cta-button" id="cta-view-work">View My Work</a>
                    <a href="#contact"   class="cta-secondary" id="cta-contact">Contact Me</a>
                </div>
                <!-- Scroll indicator -->
                <div class="scroll-indicator" aria-hidden="true">
                    <div class="scroll-dot"></div>
                </div>
            </div>

            <!-- Decorative background shapes -->
            <div class="hero-bg-shape hero-bg-shape--1" aria-hidden="true"></div>
            <div class="hero-bg-shape hero-bg-shape--2" aria-hidden="true"></div>
        </section>

        <!-- Placeholder sections for future exercises -->
        <section id="about"     style="min-height:100vh; display:flex; align-items:center; justify-content:center; font-size:2rem; color:var(--color-primary);">About Section — Bài 1.2</section>
        <section id="skills"    style="min-height:100vh; display:flex; align-items:center; justify-content:center; font-size:2rem; color:var(--color-primary);">Skills Section — Bài 1.2</section>
        <section id="portfolio" style="min-height:100vh; display:flex; align-items:center; justify-content:center; font-size:2rem; color:var(--color-primary);">Portfolio Section — Bài 1.3</section>
        <section id="contact"   style="min-height:100vh; display:flex; align-items:center; justify-content:center; font-size:2rem; color:var(--color-primary);">Contact Section — Bài 1.4</section>

    </main>

    <!-- ===== SCRIPTS ===== -->
    <script src="js/main.js" defer></script>

</body>
</html>
